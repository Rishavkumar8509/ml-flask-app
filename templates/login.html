<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction System Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
            overflow:hidden;
            position:relative;
        }

        /* PARTICLES */

        #particles-js{
            position:absolute;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:-1;
        }

        /* FLOATING BACKGROUND */

        .bg{
            position:absolute;
            width:400px;
            height:400px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            animation:move 6s infinite alternate ease-in-out;
            filter:blur(2px);
        }

        .bg:nth-child(1){
            top:-100px;
            left:-100px;
        }

        .bg:nth-child(2){
            bottom:-100px;
            right:-100px;
            animation-delay:2s;
        }

        @keyframes move{

            from{
                transform:translateY(0px);
            }

            to{
                transform:translateY(40px);
            }

        }

        /* LOGIN BOX */

        .login-box{

            width:470px;
            padding:38px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(16px);

            border-radius:28px;

            box-shadow:0 0 40px rgba(0,0,0,0.5);

            color:white;

            text-align:center;

            animation:fadeIn 1s ease;

            position:relative;

            overflow:hidden;

        }

        /* ROBOT IMAGE */

        .robot-image{

            width:130px;
            height:130px;

            object-fit:cover;

            border-radius:50%;

            border:4px solid rgba(255,255,255,0.2);

            margin-bottom:18px;

            box-shadow:0 0 25px rgba(0,198,255,0.4);

            animation:floatRobot 3s infinite alternate ease-in-out;

        }

        @keyframes floatRobot{

            from{
                transform:translateY(0px);
            }

            to{
                transform:translateY(-12px);
            }

        }

        /* HEADING */

        .login-box h1{

            font-size:42px;
            margin-bottom:24px;
            font-weight:bold;

            background:linear-gradient(
                90deg,
                #00c6ff,
                #0072ff,
                #00f5a0,
                #22c55e,
                #00c6ff
            );

            background-size:300% auto;

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            animation:
                shine 5s linear infinite,
                glow 2s infinite alternate;

        }

        @keyframes shine{

            to{
                background-position:300% center;
            }

        }

        @keyframes glow{

            from{
                filter:drop-shadow(0 0 8px #00c6ff);
            }

            to{
                filter:drop-shadow(0 0 20px #00f5a0);
            }

        }

        /* INPUT BOX */

        .input-box{
            margin:18px 0;
            position:relative;
        }

        .input-box input{

            width:100%;
            padding:15px 50px 15px 15px;

            border:none;
            outline:none;

            border-radius:14px;

            background:#111827;

            color:white;
            font-size:16px;

            transition:0.3s;

        }

        .input-box input:focus{

            box-shadow:0 0 18px rgba(0,198,255,0.5);

        }

        .input-box input::placeholder{
            color:#cbd5e1;
        }

        /* ICON */

        .icon{

            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            font-size:20px;
            color:#00f5a0;

        }

        /* PASSWORD EYE */

        .eye{

            cursor:pointer;
            color:#22c55e;
            font-size:22px;

        }

        .eye:hover{
            color:#86efac;
        }

        /* BUTTON */

        .btn{

            width:100%;
            padding:15px;

            border:none;
            border-radius:16px;

            background:linear-gradient(
                135deg,
                #16a34a,
                #22c55e,
                #4ade80
            );

            color:white;
            font-size:18px;
            font-weight:bold;

            cursor:pointer;

            transition:0.4s;

            margin-top:10px;

            box-shadow:0 0 25px rgba(34,197,94,0.4);

        }

        .btn:hover{

            transform:scale(1.05);

            box-shadow:0 0 35px rgba(74,222,128,0.7);

        }

        /* ERROR */

        .error{
            color:#ff6b6b;
            margin-top:15px;
            font-size:15px;
        }

        /* ANIMATION */

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* RESPONSIVE */

        @media(max-width:550px){

            .login-box{
                width:95%;
                padding:30px;
            }

            .login-box h1{
                font-size:32px;
            }

            .robot-image{
                width:100px;
                height:100px;
            }

        }

    </style>

</head>

<body>

<div id="particles-js"></div>

<!-- FLOATING BACKGROUND -->

<div class="bg"></div>
<div class="bg"></div>

<!-- LOGIN BOX -->

<div class="login-box">

    <!-- ROBOT IMAGE -->

    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png"
         class="robot-image">

    <!-- TITLE -->

    <h1>

        Prediction System Login

    </h1>

    <!-- FORM -->

    <form method="POST">

        <!-- USERNAME -->

        <div class="input-box">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <span class="icon">

                👤

            </span>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   id="password"
                   required>

            <span class="icon eye"
                  onclick="togglePassword()">

                👁

            </span>

        </div>

        <!-- BUTTON -->

        <button class="btn">

            ✅ Login Now

        </button>

    </form>

    <!-- ERROR -->

    {% if error %}

    <p class="error">

        {{ error }}

    </p>

    {% endif %}

</div>

<!-- PASSWORD SHOW/HIDE -->

<script>

function togglePassword(){

    let pass = document.getElementById("password");

    if(pass.type === "password"){

        pass.type = "text";

    }

    else{

        pass.type = "password";

    }

}

</script>

<!-- PARTICLES -->

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {

    particles: {

        number: {
            value: 90
        },

        size: {
            value: 3
        },

        move: {
            speed: 2
        },

        line_linked: {
            enable: true
        }

    }

});

</script>

</body>

</html>
